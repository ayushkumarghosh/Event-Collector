<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India Event Collector</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>India Event Collector</h1>
            <span id="last-updated" class="last-updated"></span>
        </div>
    </header>

    <main>
        <div class="controls">
            <div class="filter-group">
                <label>View</label>
                <div class="chips" id="view-chips">
                    <button class="chip active" data-value="cards">Cards</button>
                    <button class="chip" data-value="calendar">Calendar</button>
                </div>
            </div>

            <div class="filter-group">
                <label>Category</label>
                <div class="chips" id="category-chips">
                    <button class="chip active" data-value="">All</button>
                    <button class="chip" data-value="religion">Religion</button>
                    <button class="chip" data-value="state">State</button>
                    <button class="chip" data-value="holiday">Holiday</button>
                    <button class="chip" data-value="festival">Festival</button>
                    <button class="chip" data-value="situation">Situation</button>
                </div>
            </div>

            <div class="filter-group">
                <label>Severity</label>
                <div class="chips" id="severity-chips">
                    <button class="chip active" data-value="">All</button>
                    <button class="chip chip-critical" data-value="critical">Critical</button>
                    <button class="chip chip-high" data-value="high">High</button>
                    <button class="chip chip-normal" data-value="normal">Normal</button>
                    <button class="chip chip-low" data-value="low">Low</button>
                </div>
            </div>

            <div class="filter-group">
                <label>Location</label>
                <select id="location-select">
                    <option value="">All Locations</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Search</label>
                <input type="text" id="search-input" placeholder="Search events...">
            </div>
        </div>

        <div class="stats-bar" id="stats-bar"></div>

        <!-- Cards view -->
        <div class="event-grid" id="event-grid">
            <p class="loading">Loading events...</p>
        </div>

        <!-- Calendar view -->
        <div class="calendar-container" id="calendar-container" style="display:none">
            <div class="calendar-nav">
                <button class="cal-nav-btn" id="cal-prev">&larr;</button>
                <span class="cal-month-label" id="cal-month-label"></span>
                <button class="cal-nav-btn" id="cal-next">&rarr;</button>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
